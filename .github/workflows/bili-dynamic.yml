name: B站动态推送

on:
  schedule:
    # 每 10 分钟跑一次。GitHub Actions 的 cron 最快约 5 分钟一次，且高峰期可能延迟几分钟，属正常现象。
    - cron: "*/10 * * * *"
  workflow_dispatch: {}   # 支持在 Actions 页面手动触发

# 避免两次运行同时改 state.json
concurrency:
  group: bili-push
  cancel-in-progress: false

# 允许把更新后的 state.json 提交回仓库
permissions:
  contents: write

# 让 checkout/setup-python 直接用 Node.js 24 运行，消除 Node 20 弃用警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip   # 缓存依赖，加快运行、省 Actions 分钟数

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 检查动态并推送
        env:
          BILI_COOKIE: ${{ secrets.BILI_COOKIE }}
          # 监控名单（二选一）：
          #  · 推荐：在 Settings → Variables 里建一个 BILI_SUBS（多行，每行“名字 链接”），fork 后设一次即可，不用改代码；
          #  · 或者：直接编辑仓库里的 subscriptions.txt。设了 BILI_SUBS 就以它为准。
          BILI_SUBS: ${{ vars.BILI_SUBS }}
          # BILI_UIDS 可选：临时补充几个纯 UID（逗号分隔），平时留空即可。
          BILI_UIDS: ${{ vars.BILI_UIDS }}
          # 推送渠道：按需在仓库 Secrets 里配置任意一个或多个（都免费可选）
          BARK_URL: ${{ secrets.BARK_URL }}
          WECOM_WEBHOOK: ${{ secrets.WECOM_WEBHOOK }}
          NTFY_URL: ${{ secrets.NTFY_URL }}
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bili_push.py

      - name: 保存状态
        if: always()   # 即便上一步报错也把已更新的状态提交回去
        run: |
          if [[ -z "$(git status --porcelain state.json)" ]]; then
            echo "state.json 无变化，跳过提交"
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          git commit -m "chore: update dynamic state [skip ci]"
          # 用 HEAD:main 推送（防 detached HEAD）；失败就 rebase 最新状态后重试一次
          if git push origin HEAD:main; then
            echo "✅ state.json 已提交"
          else
            echo "首次推送失败，尝试拉取最新后重试…"
            git pull --rebase --autostash origin main || true
            if git push origin HEAD:main; then
              echo "✅ 重试后已提交"
            else
              echo "::error::state.json 推送失败，最常见原因是仓库没开写权限。"
              echo "::error::请到 Settings → Actions → General → Workflow permissions，选 'Read and write permissions' 保存后重跑。"
              exit 1
            fi
          fi
